<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>ABC Platform</h1>
      <p>Sistema de Gestión de Pedidos</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username"
          [class.error]="username?.invalid && username?.touched"
          placeholder="Ingrese su usuario">
        <span class="error-message" *ngIf="username?.invalid && username?.touched">
          <span *ngIf="username?.errors?.['required']">El usuario es requerido</span>
          <span *ngIf="username?.errors?.['minlength']">Mínimo 3 caracteres</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          [class.error]="password?.invalid && password?.touched"
          placeholder="Ingrese su contraseña">
        <span class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
          <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
        </span>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading">Cargando...</span>
      </button>
    </form>

    <div class="login-help">
      <p><strong>Credenciales de prueba:</strong></p>
      <p>Admin: admin / 123456</p>
      <p>Usuario: usuario / 123456</p>
    </div>
  </div>
</div>
